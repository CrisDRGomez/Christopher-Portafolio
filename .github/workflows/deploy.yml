name: Deploy to GitHub Pages

on:
  push:
    branches: [main]       # Se ejecuta en cada push a main
  workflow_dispatch:        # También permite dispararlo manualmente

permissions:
  contents: read
  pages: write
  id-token: write

# Solo permite un deploy a la vez; cancela el anterior si hay uno en curso
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Le pasa el nombre del repo a Next.js para calcular el basePath
          # Ej: "portfolio" → basePath="/portfolio"
          # Ej: "crisdrgomez.github.io" → sin basePath (dominio raíz)
          REPO_NAME: ${{ github.event.repository.name }}

      - name: Add .nojekyll
        # Evita que GitHub Pages procese el output con Jekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
